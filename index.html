<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student ERP Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- FontAwesome used purely for UI sidebar icons -->
    <link rel="stylesheet" href="https://cloudflare.com">
</head>
<body>

    <!-- Main ERP Workspace Layout Container -->
    <div class="erp-container">
        
        <!-- Collapsible Navigation Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2><i class="fa-solid fa-graduation-cap"></i> EduPortal</h2>
            </div>
            <nav class="menu">
                <a href="#" class="active"><i class="fa-solid fa-chart-pie"></i> Dashboard</a>
                <a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a>
                <a href="#"><i class="fa-solid fa-book"></i> Courses</a>
                <a href="#"><i class="fa-solid fa-calendar-days"></i> Attendance</a>
                <a href="#"><i class="fa-solid fa-credit-card"></i> Fee Panel</a>
                <a href="#" class="logout-link"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>
            </nav>
        </aside>

        <!-- Main Dashboard View Panel -->
        <main class="main-content">
            <header class="top-header">
                <h1>Student Management System</h1>
                <div class="user-profile">
                    <span>Welcome, <strong>Admin</strong></span>
                    <i class="fa-solid fa-circle-user profile-icon"></i>
                </div>
            </header>

            <!-- Numeric Metric Overview Cards -->
            <section class="metrics-grid">
                <div class="card">
                    <div class="card-icon blue"><i class="fa-solid fa-users"></i></div>
                    <div class="card-info">
                        <h3 id="total-students-count">0</h3>
                        <p>Total Students</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon green"><i class="fa-solid fa-chalkboard-user"></i></div>
                    <div class="card-info">
                        <h3>12</h3>
                        <p>Active Courses</p>
                    </div>
                </div>
                <div class="card">
                    <div class="card-icon orange"><i class="fa-solid fa-clock-history"></i></div>
                    <div class="card-info">
                        <h3>94.2%</h3>
                        <p>Avg Attendance</p>
                    </div>
                </div>
            </section>

            <!-- Student Data Matrix Management View -->
            <section class="data-section">
                <div class="section-header">
                    <h2>Student Registry</h2>
                    <button class="btn btn-primary" id="open-modal-btn">
                        <i class="fa-solid fa-plus"></i> Add New Student
                    </button>
                </div>
                
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Roll ID</th>
                                <th>Full Name</th>
                                <th>Email Address</th>
                                <th>Enrolled Course</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="student-table-body">
                            <!-- Injected dynamically via client JavaScript -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- Hidden Form Modal Layer for Modifying Records -->
    <div class="modal-overlay" id="student-modal">
        <div class="modal-box">
            <div class="modal-header">
                <h3>Register New Profile</h3>
                <button class="close-modal" id="close-modal-btn">&times;</button>
            </div>
            <form id="student-form">
                <div class="form-group">
                    <label for="student-name">Full Name</label>
                    <input type="text" id="student-name" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="student-email">Email Address</label>
                    <input type="email" id="student-email" required placeholder="johndoe@university.edu">
                </div>
                <div class="form-group">
                    <label for="student-course">Course Track</label>
                    <select id="student-course" required>
                        <option value="">-- Choose Track --</option>
                        <option value="B.Tech Computer Science\">B.Tech Computer Science</option>
                        <option value="B.Sc Data Science">B.Sc Data Science</option>
                        <option value="M.C.A Systems">M.C.A Systems</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-submit">Save Registry Entry</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
